<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactivity in tailwindcss</title>
    <link rel="stylesheet" href="output.css">
</head>
<body>
    <button class="bg-blue-500 rounded-md p-2 m-4 text-white">login</button>   
    <button class="bg-blue-500 rounded-md p-2 m-4 text-white hover:bg-blue-800 hover:p-10">login</button> 
    <button class="bg-blue-500 rounded-md p-2 m-4 text-white focus:bg-yellow-600">login</button> 
    <button class="bg-blue-500 rounded-md p-2 m-4 text-white active:bg-red-600">login</button> 
    <button class="bg-blue-500 rounded-md p-2 m-4 text-white  hover:bg-blue-800 focus:bg-yellow-600 active:bg-red-600">login</button> 
    <div>
        <a class="">
            <h1 class=" hover:bg-black hover:text-white">heading click</h1>
            <p class=" hover:bg-black hover:text-white">para click</p>
        </a>

    </div>

</body>
</html>
