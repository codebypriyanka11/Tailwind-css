<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>transition with tailwind css</title>
    <link rel="stylesheet" href="output.css">
</head>
<body>
   <button class="bg-blue-500  p-2 m-10 text-white rounded hover:bg-blue-900">
     Login</button>
   <button class="bg-pink-500  p-2 m-10 text-white rounded hover:bg-blue-900 transition duration-1000">
     Login</button>
     <button class="bg-orange-500  p-2 m-10 text-white rounded hover:opacity-5 transition duration-1000">
         Login</button>
         <button class="bg-red-500  p-2 m-10 text-white rounded hover:rotate-45 transition-transform duration-1000"> Login</button>
         <button class="bg-gray-500  p-2 m-10 text-white rounded hover:scale-75 transition-transform duration-1000"> Login</button>
 <button class="bg-amber-500  p-2 m-10 text-white rounded hover:rotate-x-90 transition-transform duration-1000"> Login</button>
 <button class="bg-lime-500  p-2 m-10 text-white rounded hover:rotate-y-90 transition-transform duration-1000"> Login</button>
 <button class="bg-taupe-500  p-2 m-10 text-white rounded hover:scale-x-90 hover:scale-y-50 transition-transform duration-1000"> Login</button>
 <button class="bg-green-500 p-2 m-10 text-white rounded hover:scale-x-150 transition-transform duration-1000"> Login</button>
<button class="bg-purple-500  p-2 m-10 text-white rounded hover:scale-y-150 transition-transform duration-1000"> Login</button>
<br>

</body>
</html>
